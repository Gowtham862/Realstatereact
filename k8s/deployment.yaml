apiVersion: apps/v1
kind: Deployment
metadata:
  name: real
  namespace: real
spec:
  replicas: 2
  selector:
    matchLabels:
      app: real
  template:
    metadata:
      labels:
        app: real
    spec:
      containers:
        - name: real
          image: asia-south1-docker.pkg.dev/project-ea2672a1-081c-4491-a51/real/real:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10