# ansible/setup.yml
# Run with: ansible-playbook -i inventory.ini setup.yml
# On any new GCP VM - fully automatic, no manual steps

---
- name: Setup VM for Real Estate React App
  hosts: webservers
  become: true

  vars:
    gcp_project_id: "project-ea2672a1-081c-4491-a51"
    gcp_region: "asia-south1"
    full_image: "asia-south1-docker.pkg.dev/project-ea2672a1-081c-4491-a51/real/real:latest"
    vm_user: "gowthamk712812"

  tasks:

    # ──────────────────────────────────────────
    # 1. INSTALL DOCKER
    # ──────────────────────────────────────────
    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - software-properties-common
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Add Docker repository
      shell: |
        echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian $(lsb_release -cs) stable" \
        | tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ vm_user }}"
        groups: docker
        append: yes

    # ──────────────────────────────────────────
    # 2. INSTALL GCLOUD CLI
    # ──────────────────────────────────────────
    - name: Add Google Cloud GPG key
      shell: |
        curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg \
        | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
      args:
        creates: /usr/share/keyrings/cloud.google.gpg

    - name: Add Google Cloud repository
      shell: |
        echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" \
        | tee /etc/apt/sources.list.d/google-cloud-sdk.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/google-cloud-sdk.list

    - name: Install gcloud CLI
      apt:
        name: google-cloud-cli
        state: present
        update_cache: yes

    # ──────────────────────────────────────────
    # 3. AUTHENTICATE WITH GCP (uses VM's built-in service account)
    # No JSON key needed! GCP VMs authenticate automatically.
    # ──────────────────────────────────────────
    - name: Set GCP project
      command: gcloud config set project {{ gcp_project_id }}
      become_user: "{{ vm_user }}"

    - name: Configure Docker for Artifact Registry
      command: gcloud auth configure-docker {{ gcp_region }}-docker.pkg.dev --quiet
      become_user: "{{ vm_user }}"

    # ──────────────────────────────────────────
    # 4. PULL AND RUN YOUR REACT APP
    # ──────────────────────────────────────────
    - name: Pull React app image
      command: docker pull {{ full_image }}
      become_user: "{{ vm_user }}"

    - name: Stop old container if running
      shell: docker stop real 2>/dev/null || true

    - name: Remove old container if exists
      shell: docker rm real 2>/dev/null || true

    - name: Run React app on port 80
      shell: |
        docker run -d \
          --name real \
          --restart unless-stopped \
          -p 80:80 \
          {{ full_image }}

    - name: Verify app is running
      command: docker ps --filter name=real
      register: status

    - name: Show status
      debug:
        msg: "✅ App is running: {{ status.stdout }}"
